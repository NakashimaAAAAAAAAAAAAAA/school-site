<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サンプルサイト</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- メニューボタン -->
<div id="menuBtn">☰</div>

<!-- サイドメニュー -->
<nav id="sideMenu">
  <ul>
    <li><a href="#">ホーム</a></li>
    <li><a href="#">サービス</a></li>
    <li><a href="#">お問い合わせ</a></li>
  </ul>
</nav>

<!-- ヘッダー -->
<header>
  <h1>マイサイト</h1>
  <p>シンプルなWebページ</p>
</header>

<!-- セクション -->
<section>
  <h2>概要</h2>
  <p>ここに説明文が入ります。</p>
</section>

<section>
  <h2>サービス</h2>
  <p>サービス内容を書きます。</p>
</section>

<!-- フッター -->
<footer>
  © 2026 My Site
</footer>

<!-- JavaScript -->
<script>
  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");

  menuBtn.addEventListener("click", () => {
    sideMenu.classList.toggle("open");
  });
</script>

</body>
</html>
